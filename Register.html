<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Identical Background Design Style */
        body {
            background: linear-gradient(135deg, #2c2eb8, #567fa3);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* Simple Semi-Transparent Card Container */
        .register-card {
            background-color: rgba(196, 196, 196, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>


<div class="register-card">
    <h2 class="text-center mb-4">Student Registration</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        <!-- Row 1: Full Name and LRN Fields -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Juan Dela Cruz" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Student LRN</label>
                <input type="text" class="form-control is-valid" value="136853140177">
                <div class="valid-feedback fw-bold text-info">
                    LRN verified successfully!
                </div>
            </div>
        </div>

         <div class="mb-3">
            <label class="form-label">Username Handle</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="student.username" required>
                <span class="input-group-text">@deped.gov.ph</span>
            </div>
        </div>


        <div class="mb-3">
            <label class="form-label">Address</label>
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Addresss" required>
            </div>
        </div>


        <!-- Row 3: Track Selection and Gender Controls -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Academic Track / Strand</label>
                <select class="form-select" required>
                    <option value="" selected disabled>Choose strand...</option>
                    <option value="ict">TVL - ICT (Programming)</option>
                    <option value="ict">TVL - ICT (Animation)</option>
                    <option value="ict">TVL - HE (Home Economics)</option>
                    <option value="stem">Academic - STEM</option>
                    <option value="abm">Academic - ABM</option>
                    <option value="abm">Academic - HUMSS</option>
                    <option value="abm">Academic - GAS</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label d-block">Gender Profile</label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>


        <!-- NEW Row 4: Password and Confirm Password Fields -->
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Confirm password" required>
            </div>
        </div>


        <!-- Row 5: Checkbox terms option wrapper -->
        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I read and agree to the terms and conditions of this registration form.
            </label>
        </div>


        <button type="submit" class="btn btn-success w-100 py-2">Submit Registration</button>
    </form>
    <p class="text-center mt-3">
        <a href="indexlogin.html" class="text-center mt-3 d-block text-decoration-none text-info">Already have an account? Login here</a>
    </p>
</div>
</body>
</html>
